# 实验一：ResNet101 + PSPNet（冻结 backbone，linear probing）
# 用法：python tools/train.py --config configs/default.yaml

experiment: "exp1_resnet101_frozen"

data:
  root: "./data"
  split_train: "trainaug"       # SBD 增强训练集（10,582 张）
  crop_size: 512
  scale_range: [0.5, 2.0]
  num_workers: 4

model:
  backbone: "resnet101"
  head: "psp"
  num_classes: 21
  frozen_backbone: true          # 只训练分割头

train:
  max_iters: 30000               # epochs 由 train.py 自动推算
  batch_size: 16
  lr: 0.01                       # head lr；batch 翻倍时同步翻倍
  backbone_lr_mult: 0.1          # 全量微调时生效，frozen 时忽略
  weight_decay: 1.0e-4
  aux_weight: 0.4                # auxiliary loss 权重（仅 resnet101）
  ignore_index: 255

output:
  log_dir: "./runs"
  save_dir: "./checkpoints"
  save_every: 5
